      <rect x="18" y="267" width="282" height="34" rx="8" fill="#fff"/>
      <text x="38" y="289" class="muted">device_info</text><text x="278" y="289" text-anchor="end" class="soft">12</text>
      <rect x="18" y="306" width="282" height="34" rx="8" fill="#fff9f1" stroke="#f0c777"/>
      <circle cx="32" cy="323" r="5" class="gold"/><text x="48" y="328" class="text">event</text><text x="278" y="328" text-anchor="end" class="gold">9</text>
      <rect x="18" y="345" width="282" height="38" rx="8" fill="#fff1e8" stroke="#ff6a1a"/>
      <circle cx="32" cy="364" r="5" class="orange"/><text x="48" y="369" class="text">record</text><text x="278" y="369" text-anchor="end" class="accent">11537</text>
      <rect x="18" y="388" width="282" height="34" rx="8" fill="#fff"/>
      <text x="38" y="410" class="muted">lap</text><text x="278" y="410" text-anchor="end" class="soft">13</text>
      <rect x="18" y="427" width="282" height="34" rx="8" fill="#fff"/>
      <text x="38" y="449" class="muted">session</text><text x="278" y="449" text-anchor="end" class="soft">1</text>
