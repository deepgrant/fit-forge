<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 980" font-family="Inter,-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <style>
      .bg{fill:#fff}.bar{fill:#fff;stroke:#e3e5e9}.card{fill:#fff;stroke:#e3e5e9}.raised{fill:#f6f7f9;stroke:#e3e5e9}.text{fill:#15181e}.muted{fill:#5a6472}.soft{fill:#9aa3af}.accent{fill:#e1590f}.orange{fill:#ff6a1a}.green{fill:#1f9d6b}.gold{fill:#e0921a}.red{fill:#e0453c}.line{stroke:#e3e5e9}.route{fill:none;stroke:#ff6a1a;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}.route2{fill:none;stroke:#1f9d6b;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}.grid{stroke:#e3e5e9;stroke-width:1}.tiny{font-size:12px}.label{font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}.h1{font-family:Space Grotesk,Inter,sans-serif;font-size:54px;font-weight:700}.h2{font-family:Space Grotesk,Inter,sans-serif;font-size:22px;font-weight:700}.h3{font-family:Space Grotesk,Inter,sans-serif;font-size:17px;font-weight:700}.value{font-family:Space Grotesk,Inter,sans-serif;font-weight:700}.mono{font-family:SFMono-Regular,Consolas,Liberation Mono,monospace}
    </style>
    <g id="hammer" fill="none" stroke="#1a1206" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11.414 10 4.031 17.418a2.091 2.091 0 0 0 0 2.967 2.11 2.11 0 0 0 2.976 0L14.414 13"/>
      <path d="m18.121 15.293 2.586-2.586a1 1 0 0 0 0-1.414l-7.586-7.586a1 1 0 0 0-1.414 0L9.121 6.293a1 1 0 0 0 0 1.414l7.586 7.586a1 1 0 0 0 1.414 0Z"/>
    </g>
  </defs>

  <rect width="1440" height="980" class="bg"/>
  <rect x="0.5" y="0.5" width="1439" height="979" class="bar"/>

  <line x1="0" y1="72" x2="1440" y2="72" class="line"/>
  <rect x="42" y="20" width="36" height="36" rx="8" class="orange"/>
  <use href="#hammer" transform="translate(48 26) scale(.9)"/>
  <text x="92" y="43" class="text" font-size="20" font-weight="800">FFM<tspan fill="#e1590f">Forge</tspan></text>
  <text x="198" y="43" class="muted" font-size="13" font-weight="600">editor</text>
  <rect x="612" y="18" width="216" height="38" rx="19" class="raised"/>
  <rect x="618" y="23" width="96" height="28" rx="14" class="orange"/>
