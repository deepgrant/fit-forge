        <text x="38" y="350">09:58:52</text><text x="150" y="350">42.5081,-71.4744</text><text x="286" y="350">84</text><text x="334" y="350">351</text><text x="402" y="350">17.3</text><text x="476" y="350">77</text><text x="530" y="350">23</text>
        <rect x="32" y="366" width="546" height="28" rx="7" fill="#fff9f1" stroke="#f0c777"/>
        <text x="38" y="385">10:14:08</text><text x="150" y="385">42.5128,-71.4410</text><text x="286" y="385">--</text><text x="334" y="385">0</text><text x="402" y="385">31.9</text><text x="476" y="385">88</text><text x="530" y="385">24</text>
        <text x="38" y="422">10:14:09</text><text x="150" y="422">42.5130,-71.4407</text><text x="286" y="422">148</text><text x="334" y="422">188</text><text x="402" y="422">32.1</text><text x="476" y="422">88</text><text x="530" y="422">24</text>
        <text x="38" y="456">10:14:10</text><text x="150" y="456">42.5132,-71.4402</text><text x="286" y="456">149</text><text x="334" y="456">190</text><text x="402" y="456">32.2</text><text x="476" y="456">89</text><text x="530" y="456">24</text>
        <rect x="32" y="472" width="546" height="28" rx="7" fill="#fff1e8" stroke="#ffb083"/>
        <text x="38" y="491">10:22:34</text><text x="150" y="491">42.5401,-71.4040</text><text x="286" y="491">151</text><text x="334" y="491">1134</text><text x="402" y="491">33.8</text><text x="476" y="491">94</text><text x="530" y="491">25</text>
        <text x="38" y="528">10:22:35</text><text x="150" y="528">42.5404,-71.4037</text><text x="286" y="528">151</text><text x="334" y="528">214</text><text x="402" y="528">33.9</text><text x="476" y="528">94</text><text x="530" y="528">25</text>
        <text x="38" y="562">10:22:36</text><text x="150" y="562">42.5407,-71.4034</text><text x="286" y="562">152</text><text x="334" y="562">217</text><text x="402" y="562">34.2</text><text x="476" y="562">95</text><text x="530" y="562">25</text>
      </g>
