  <text x="770" y="42" text-anchor="middle" class="muted" font-size="13" font-weight="700">Editor</text>
  <rect x="1262" y="18" width="118" height="38" rx="19" class="card"/>
  <circle cx="1281" cy="37" r="6" class="orange"/>
  <text x="1296" y="42" class="text" font-size="14" font-weight="700">Dark mode</text>

  <text x="96" y="134" class="label accent">Garmin FIT editor workspace</text>
  <text x="96" y="196" class="h1 text">Inspect and repair a FIT file.</text>
