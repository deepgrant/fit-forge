      <circle cx="42" cy="122" r="6" class="gold"/><text x="58" y="116" class="text" font-size="15" font-weight="800">Heart rate dropout</text><text x="58" y="136" class="muted" font-size="12">1 suspicious range</text>
      <rect x="22" y="166" width="234" height="62" rx="10" fill="#fff1e8" stroke="#ffb083"/>
      <circle cx="42" cy="196" r="6" class="orange"/><text x="58" y="190" class="text" font-size="15" font-weight="800">Power spike</text><text x="58" y="210" class="muted" font-size="12">1134 W single-record jump</text>
      <rect x="22" y="240" width="234" height="62" rx="10" class="raised"/>
      <circle cx="42" cy="270" r="6" class="green"/><text x="58" y="264" class="text" font-size="15" font-weight="800">GPS continuity</text><text x="58" y="284" class="muted" font-size="12">route is upload-safe</text>
      <rect x="22" y="314" width="234" height="62" rx="10" class="raised"/>
      <circle cx="42" cy="344" r="6" class="green"/><text x="58" y="338" class="text" font-size="15" font-weight="800">CRC / layout</text><text x="58" y="358" class="muted" font-size="12">binary structure valid</text>
