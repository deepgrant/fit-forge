<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 980" font-family="Inter,-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <style>
      .bg{fill:#fff}.bar{fill:#fff;stroke:#e3e5e9}.card{fill:#fff;stroke:#e3e5e9}.raised{fill:#f6f7f9;stroke:#e3e5e9}.text{fill:#15181e}.muted{fill:#5a6472}.soft{fill:#9aa3af}.accent{fill:#e1590f}.orange{fill:#ff6a1a}.green{fill:#1f9d6b}.gold{fill:#e0921a}.red{fill:#e0453c}.line{stroke:#e3e5e9}.axis{stroke:#d6dae0}.hr{fill:none;stroke:#e0453c;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}.power{fill:none;stroke:#ff6a1a;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}.speed{fill:none;stroke:#1f9d6b;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}.label{font-size:13px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}.h1{font-family:Space Grotesk,Inter,sans-serif;font-size:54px;font-weight:700}.h2{font-family:Space Grotesk,Inter,sans-serif;font-size:22px;font-weight:700}.h3{font-family:Space Grotesk,Inter,sans-serif;font-size:17px;font-weight:700}.mono{font-family:SFMono-Regular,Consolas,Liberation Mono,monospace}.value{font-family:Space Grotesk,Inter,sans-serif;font-weight:700}
    </style>
    <g id="hammer" fill="none" stroke="#1a1206" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11.414 10 4.031 17.418a2.091 2.091 0 0 0 0 2.967 2.11 2.11 0 0 0 2.976 0L14.414 13"/>
      <path d="m18.121 15.293 2.586-2.586a1 1 0 0 0 0-1.414l-7.586-7.586a1 1 0 0 0-1.414 0L9.121 6.293a1 1 0 0 0 0 1.414l7.586 7.586a1 1 0 0 0 1.414 0Z"/>
    </g>
  </defs>

  <rect width="1440" height="980" class="bg"/>
  <rect x="0.5" y="0.5" width="1439" height="979" class="bar"/>
  <line x1="0" y1="72" x2="1440" y2="72" class="line"/>
  <rect x="42" y="20" width="36" height="36" rx="8" class="orange"/>
  <use href="#hammer" transform="translate(48 26) scale(.9)"/>
  <text x="92" y="43" class="text" font-size="20" font-weight="800">FFM<tspan fill="#e1590f">Forge</tspan></text>
  <text x="198" y="43" class="muted" font-size="13" font-weight="600">editor</text>
  <rect x="612" y="18" width="216" height="38" rx="19" class="raised"/>
  <text x="666" y="42" text-anchor="middle" class="muted" font-size="13" font-weight="700">Merge</text>
  <rect x="724" y="23" width="96" height="28" rx="14" class="orange"/>
  <text x="772" y="42" text-anchor="middle" class="text" font-size="13" font-weight="700">Editor</text>
  <rect x="1262" y="18" width="118" height="38" rx="19" class="card"/>
  <circle cx="1281" cy="37" r="6" class="orange"/>
  <text x="1296" y="42" class="text" font-size="14" font-weight="700">Dark mode</text>

  <text x="96" y="134" class="label accent">Signal diagnostics</text>
  <text x="96" y="196" class="h1 text">Find sensor dropouts before export.</text>
  <rect x="1040" y="116" width="112" height="30" rx="15" fill="#fff5e6" stroke="#f0c777"/>
  <text x="1096" y="136" text-anchor="middle" fill="#b16907" font-size="12" font-weight="800">3 selected</text>
  <rect x="1162" y="116" width="124" height="30" rx="15" fill="#f6f7f9" stroke="#e3e5e9"/>
  <text x="1224" y="136" text-anchor="middle" class="muted" font-size="12" font-weight="800">record overlay</text>

  <g transform="translate(96 238)">
    <rect width="292" height="650" rx="14" class="card"/>
    <text x="22" y="36" class="label accent">Issue groups</text>
    <text x="22" y="66" class="h2 text">Diagnostics</text>
    <rect x="22" y="94" width="248" height="76" rx="10" fill="#fff9f1" stroke="#f0c777"/>
    <text x="44" y="124" class="text" font-size="16" font-weight="800">Heart rate dropout</text>
    <text x="44" y="148" class="muted" font-size="13">2 rows missing HR values</text>
    <circle cx="244" cy="132" r="10" class="gold"/>
    <rect x="22" y="184" width="248" height="76" rx="10" fill="#fff1e8" stroke="#ffb083"/>
    <text x="44" y="214" class="text" font-size="16" font-weight="800">Power spike</text>
    <text x="44" y="238" class="muted" font-size="13">1 row above expected range</text>
    <circle cx="244" cy="222" r="10" class="orange"/>
    <rect x="22" y="274" width="248" height="76" rx="10" class="raised"/>
    <text x="44" y="304" class="text" font-size="16" font-weight="800">Speed / GPS jump</text>
    <text x="44" y="328" class="muted" font-size="13">no repair required</text>
    <circle cx="244" cy="312" r="10" class="green"/>
    <rect x="22" y="386" width="248" height="158" rx="10" class="raised"/>
    <text x="44" y="418" class="label accent">Range selection</text>
    <text x="44" y="450" class="h3 text">10:14:08 - 10:22:34</text>
    <text x="44" y="480" class="muted" font-size="14">Timeline highlights are synchronized with selected table rows.</text>
    <rect x="44" y="506" width="92" height="28" rx="14" fill="#e8f7f0" stroke="#9ed9bf"/>
    <text x="90" y="525" text-anchor="middle" fill="#14835a" font-size="12" font-weight="800">safe repair</text>
  </g>

  <g transform="translate(412 238)">
    <rect width="666" height="650" rx="14" class="card"/>
    <text x="22" y="36" class="label accent">Charts</text>
    <text x="22" y="66" class="h2 text">Heart rate, power, speed</text>
    <rect x="482" y="25" width="72" height="30" rx="15" fill="#fff1e8" stroke="#ffb083"/>
    <text x="518" y="45" text-anchor="middle" class="accent" font-size="12" font-weight="800">power</text>
    <rect x="562" y="25" width="80" height="30" rx="15" class="raised"/>
    <text x="602" y="45" text-anchor="middle" class="muted" font-size="12" font-weight="800">all fields</text>

    <rect x="22" y="90" width="622" height="154" rx="10" class="raised"/>
    <text x="42" y="120" class="label accent">Heart rate</text>
    <line x1="42" y1="214" x2="622" y2="214" class="axis"/>
    <rect x="240" y="112" width="64" height="104" rx="8" fill="#fff5e6" stroke="#f0c777"/>
    <path d="M52 188 C100 168 146 150 198 146 S252 206 304 186 S392 150 456 132 S560 140 622 122" class="hr"/>
    <text x="245" y="232" class="gold" font-size="12" font-weight="800">dropout</text>

    <rect x="22" y="270" width="622" height="154" rx="10" class="raised"/>
    <text x="42" y="300" class="label accent">Power</text>
    <line x1="42" y1="394" x2="622" y2="394" class="axis"/>
    <rect x="436" y="292" width="42" height="104" rx="8" fill="#fff1e8" stroke="#ffb083"/>
    <path d="M52 374 C110 336 168 352 222 330 S314 350 378 326 S438 218 466 328 S548 344 622 318" class="power"/>
    <text x="432" y="412" class="accent" font-size="12" font-weight="800">spike</text>

    <rect x="22" y="450" width="622" height="154" rx="10" class="raised"/>
    <text x="42" y="480" class="label accent">Speed / GPS</text>
    <line x1="42" y1="574" x2="622" y2="574" class="axis"/>
    <path d="M52 546 C118 500 172 498 230 518 S350 556 416 512 S544 494 622 470" class="speed"/>
    <rect x="42" y="620" width="580" height="10" rx="5" fill="#ffd0b4"/>
    <rect x="240" y="620" width="64" height="10" rx="5" class="gold"/>
    <rect x="436" y="620" width="42" height="10" rx="5" class="orange"/>
  </g>

  <g transform="translate(1100 238)">
    <rect width="244" height="650" rx="14" class="card"/>
    <text x="22" y="36" class="label accent">Selected rows</text>
    <text x="22" y="66" class="h2 text">Record overlay</text>
    <rect x="22" y="94" width="200" height="112" rx="10" fill="#fff9f1" stroke="#f0c777"/>
    <text x="42" y="124" class="text" font-size="15" font-weight="800">10:14:08</text>
    <text x="42" y="150" class="muted" font-size="13">HR missing, power 0 W</text>
    <text x="42" y="176" class="mono muted" font-size="12">row 4218</text>
    <rect x="22" y="218" width="200" height="112" rx="10" fill="#fff1e8" stroke="#ffb083"/>
    <text x="42" y="248" class="text" font-size="15" font-weight="800">10:22:34</text>
    <text x="42" y="274" class="muted" font-size="13">power 1134 W</text>
    <text x="42" y="300" class="mono muted" font-size="12">row 4709</text>

    <line x1="22" y1="366" x2="222" y2="366" class="line"/>
    <text x="22" y="402" class="label accent">Batch action</text>
    <text x="22" y="432" class="h3 text">3 proposed repairs</text>
    <text x="22" y="462" class="muted" font-size="13">Interpolate short dropouts and replace single-record spikes.</text>
    <rect x="22" y="506" width="200" height="40" rx="8" class="orange"/>
    <text x="122" y="531" text-anchor="middle" class="text" font-size="14" font-weight="800">Review repairs</text>
    <rect x="22" y="560" width="200" height="40" rx="8" class="card"/>
    <text x="122" y="585" text-anchor="middle" class="text" font-size="14" font-weight="800">Clear selection</text>
  </g>
</svg>
