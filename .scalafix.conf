# Scala 3 lint/refactor rules enforced in the build (./gradlew check).
rules = [
  DisableSyntax
  RemoveUnused
  OrganizeImports
  RedundantSyntax
]

triggered.rules = [
  DisableSyntax
  RemoveUnused
  OrganizeImports
  RedundantSyntax
]

# Deny dangerous Java-isms. The Garmin SDK interop in GarminFitCodec is the only
# sanctioned place for nulls/throws and is opted out locally with scalafix:off.
DisableSyntax.noThrows = true
DisableSyntax.noNulls = true
DisableSyntax.noReturns = true
DisableSyntax.noVars = true
DisableSyntax.noAsInstanceOf = true

# Import ordering: grouped (java/scala/third-party/project), alphabetized, no wildcards.
OrganizeImports.groupedImports = Explode
OrganizeImports.removeUnused = true
OrganizeImports.groups = [
  "java."
  "scala."
  "*"
  "fitforge."
]
