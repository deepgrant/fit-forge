version = "3.8.3"
runner.dialect = scala3
maxColumn = 120
align.preset = more
indent.main = 2
indent.callSite = 2
indent.ctrlSite = 2
indent.defnSite = 2
indent.extendSite = 2
indent.significant = 2
docstrings.style = Asterisk
trailingCommas = multiple

# Keep classic brace syntax — never strip braces or convert to significant indentation.
rewrite.scala3.convertToNewSyntax = false
rewrite.scala3.removeOptionalBraces = false
rewrite.rules = [SortImports, RedundantParens]
