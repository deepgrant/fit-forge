ffmforge {
  port = 8080
  static-dir = "/app/static"
  session-ttl = 120 minutes
  presign-ttl = 15 minutes
}

pekko {
  http {
    server {
      # FIT activity files can be sizeable (multi-MB), and a merge uploads several
      # at once via multipart — allow generous request bodies.
      parsing.max-content-length = 200m
      parsing.illegal-header-warnings = off
      request-timeout = 120s
      idle-timeout = 120s
      parsing.max-uri-length = 3072
    }
    host-connection-pool {
      max-connections = 64
      max-open-requests = 256
    }
  }

  loggers = ["org.apache.pekko.event.slf4j.Slf4jLogger"]
  loglevel = "INFO"
  logging-filter = "org.apache.pekko.event.slf4j.Slf4jLoggingFilter"
  logger-startup-timeout = 30s

  default-dispatcher {
    type = "Dispatcher"
    executor = "fork-join-executor"

    fork-join-executor {
      parallelism-min = 8
      parallelism-max = 64
      parallelism-factor = 3.0
    }
  }

  coordinated-shutdown {
    phases {
      before-service-unbind {
        timeout = 60s
        recover = off
      }
      actor-system-terminate {
        timeout = 1s
      }
    }
  }
}
