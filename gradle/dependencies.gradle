ext {
  versions = [:]
  libs = [:]
}

// Versions pinned to current latest stable (verified June 2026).
versions +=
  [ bouncyCastle: "1.80"
  , scala: "3.8"
  , scalaMinor: "4"               // Scala 3.8.4 (Scala Next, latest)
  , scalaCollectionsCompat: "2.13.0"
  , scalaTest: "3.2.19"
  , scalaXml: "2.4.0"
  , sprayJSON: "1.3.6"
  , pekko: "1.6.0"                // Pekko core (latest stable 1.x)
  , pekkoHttp: "1.3.0"            // Pekko HTTP (latest stable 1.x)
  , slf4j: "2.0.16"
  , logback: "1.5.18"
  , pprint: "0.9.0"
  , garminFit: "21.205.0"         // Official Garmin FIT Java SDK (Maven Central)
  ]

libs +=
  [ scala: "org.scala-lang:scala3-library_3:${versions.scala}.${versions.scalaMinor}"
  , scalaXML: "org.scala-lang.modules:scala-xml_3:${versions.scalaXml}"
  , scalaCollectionsCompat: "org.scala-lang.modules:scala-collection-compat_3:${versions.scalaCollectionsCompat}"
  , scalaTest: "org.scalatest:scalatest_3:${versions.scalaTest}"
  , sprayJSON: "io.spray:spray-json_3:${versions.sprayJSON}"
  , pekko_actor: "org.apache.pekko:pekko-actor_3:${versions.pekko}"
  , pekko_http: "org.apache.pekko:pekko-http_3:${versions.pekkoHttp}"
  , pekko_http_xml: "org.apache.pekko:pekko-http-xml_3:${versions.pekkoHttp}"
  , pekko_slf4j: "org.apache.pekko:pekko-slf4j_3:${versions.pekko}"
  , pekko_stream: "org.apache.pekko:pekko-stream_3:${versions.pekko}"
  , slf4j: "org.slf4j:slf4j-api:${versions.slf4j}"
  , logback_classic: "ch.qos.logback:logback-classic:${versions.logback}"
  , logback_core: "ch.qos.logback:logback-core:${versions.logback}"
  , pprint: "com.lihaoyi:pprint_3:${versions.pprint}"
  , garminFit: "com.garmin:fit:${versions.garminFit}"
  , bcprov: "org.bouncycastle:bcprov-jdk18on:${versions.bouncyCastle}"
  , bcpkix: "org.bouncycastle:bcpkix-jdk18on:${versions.bouncyCastle}"
  ]
